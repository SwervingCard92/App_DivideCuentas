publish_to: 'none'
version: 1.0.0+1

environment:
  sdk: '>=3.0.0 <4.0.0'

dependencies:
  flutter:
    sdk: flutter
  # Descomenta esta línea para activar el botón de WhatsApp:
  # url_launcher: ^6.2.5

